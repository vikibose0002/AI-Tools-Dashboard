name: Daily AI Tools Dashboard Update

on:
  schedule:
    # 8:30 AM IST = 3:00 AM UTC  (IST = UTC + 5:30)
    - cron: '0 3 * * *'
  workflow_dispatch:   # Manual trigger anytime from Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run dashboard updater
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_USERNAME:    ${{ secrets.GITHUB_USERNAME }}
        run: python update_dashboard.py

      # Always commit — even if only data.json changed
      - name: Commit and push updates
        run: |
          git config user.email "dashbot@github.com"
          git config user.name "Dashboard Bot"
          # Stage ALL files (data.json + index.html + cache.json)
          git add -A
          # Commit only if there are staged changes
          if git diff --staged --quiet; then
            echo "No file changes to commit"
          else
            git commit -m "Auto update $(TZ='Asia/Kolkata' date +'%d %b %Y %H:%M IST')"
            git push
            echo "Changes pushed successfully"
          fi
