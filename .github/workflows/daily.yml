name: Daily AI Tools Dashboard Update

on:
  schedule:
    # 08:00 AM IST = 02:30 UTC
    - cron: '30 2 * * *'
  workflow_dispatch:   # lets you trigger manually from Actions tab anytime

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4

      - name: Run dashboard updater
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_USERNAME:    ${{ secrets.GITHUB_USERNAME }}
        run: python update_dashboard.py

      - name: Commit and push all updated files
        run: |
          git config user.email "dashbot@github.com"
          git config user.name "Dashboard Bot"
          git add -A
          git diff --staged --quiet || git commit -m "Auto update $(TZ='Asia/Kolkata' date +'%Y-%m-%d %H:%M IST')"
          git push
