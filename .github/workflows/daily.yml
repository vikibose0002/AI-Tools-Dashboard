name: Daily AI Tools Dashboard Update

on:
  schedule:
    - cron: '*/5 * * * *'   
  workflow_dispatch:        # Manual trigger anytime from Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run dashboard updater
        env:
          NVIDIA_API_KEY:      ${{ secrets.NVIDIA_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_USERNAME:     ${{ secrets.GITHUB_USERNAME }}
        run: python update_dashboard.py

      - name: Commit and push updated files
        run: |
          git config user.email "dashbot@github.com"
          git config user.name "Dashboard Bot"
          git add -A
          git diff --staged --quiet || git commit -m "Auto update $(date +'%Y-%m-%d %H:%M')"
          git push
